<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Marketplace - Sign Up</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--bg-offset), var(--background)); font-family: 'Roboto', sans-serif;">
    <div class="auth-container" style="background: var(--background); padding: 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center;">
        <div style="margin-bottom: 30px;">
            <i class="fa-solid fa-leaf fa-3x" style="color: var(--primary);"></i>
            <h2 style="font-family: 'Playfair Display', serif; color: var(--primary); margin-top: 15px; font-size: 2rem;">Create Account</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Join the farmer marketplace community</p>
        </div>
        <form id="signupForm" style="text-align: left;">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Full Name</label>
                <input type="text" id="signupName" required style="width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-offset); color: var(--text-main); font-size: 1rem; outline: none; transition: border-color 0.3s; box-sizing: border-box;" placeholder="Enter your full name">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Email</label>
                <input type="email" id="signupEmail" required style="width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-offset); color: var(--text-main); font-size: 1rem; outline: none; transition: border-color 0.3s; box-sizing: border-box;" placeholder="Enter your email">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Password</label>
                <input type="password" id="signupPassword" required minlength="6" style="width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-offset); color: var(--text-main); font-size: 1rem; outline: none; transition: border-color 0.3s; box-sizing: border-box;" placeholder="Create a password (min. 6 chars)">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Address</label>
                <input type="text" id="address" placeholder="Enter your address" required style="width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-offset); color: var(--text-main); font-size: 1rem; outline: none; transition: border-color 0.3s; box-sizing: border-box;">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <button type="button" onclick="getLocation()" class="location-btn" style="width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-offset); color: var(--text-main); font-size: 1rem; cursor: pointer;">
                    Use My Current Location
                </button>
                <p id="locationStatus" style="font-size: 12px; color: green; margin-top: 8px;"></p>
            </div>
            <input type="hidden" id="latitude">
            <input type="hidden" id="longitude">
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Register As</label>
                <select id="signupRole" required style="width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-offset); color: var(--text-main); font-size: 1rem; outline: none; cursor: pointer; box-sizing: border-box;">
                    <option value="buyer">Buyer (Looking for fresh produce)</option>
                    <option value="farmer">Farmer (Selling produce)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 1.1rem; border-radius: 30px; font-weight: 500; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);">Sign Up</button>
        </form>
        <p style="margin-top: 25px; color: var(--text-muted);">Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 500; text-decoration: none;">Login</a></p>
        <div style="margin-top: 20px;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.3s;">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
