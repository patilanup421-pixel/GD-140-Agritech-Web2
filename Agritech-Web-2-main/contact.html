<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Marketplace - Contact Us</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <style>
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 40px; }
        .contact-info { background: var(--bg-offset); padding: 40px; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; }
        .contact-item { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 25px; }
        .contact-item i { font-size: 1.5rem; color: var(--primary); margin-top: 5px; }
        .contact-form { padding: 20px; }
        .contact-form .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .contact-form label { color: var(--text-main); font-weight: 500; font-size: 0.95rem; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--background); color: var(--text-main); font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .contact-form input:focus, .contact-form textarea:focus { border-color: var(--primary); }
        .map-placeholder { width: 100%; height: 300px; background: #e2e8f0; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-top: 60px; color: #64748b; font-size: 1.2rem; }
        [data-theme="dark"] .map-placeholder { background: #1e293b; color: #94a3b8; }
        @media (max-width: 800px) { .contact-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="global-loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--background); display:flex; justify-content:center; align-items:center; z-index:9999;">
        <i class="fa-solid fa-spinner fa-spin fa-3x" style="color:var(--primary);"></i>
    </div>

    <div id="navbar-container"></div>

    <main class="page-container" style="padding-top: 100px; padding-bottom: 60px;">
        <div style="text-align: center; max-width: 600px; margin: 0 auto;">
            <h1 style="color: var(--primary); font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 15px;">Get in Touch</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">We'd love to hear from you. Please fill out the form below or use our contact information.</p>
        </div>

        <div class="contact-grid">
            <div class="contact-info">
                <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 30px;">Contact Information</h2>
                <div class="contact-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <div>
                        <h4 style="margin-bottom: 5px;">Main Office</h4>
                        <p style="color: var(--text-secondary); line-height: 1.5;">123 Farmville Road<br>Greenville, CA 90210</p>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fa-solid fa-phone"></i>
                    <div>
                        <h4 style="margin-bottom: 5px;">Phone Number</h4>
                        <p style="color: var(--text-secondary);">+1 (555) 123-4567</p>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fa-solid fa-envelope"></i>
                    <div>
                        <h4 style="margin-bottom: 5px;">Email Address</h4>
                        <p style="color: var(--text-secondary);">support@farmconnect.com</p>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <form id="contactForm">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" required placeholder="How can we help?">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" required placeholder="Write your message here..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 30px; padding: 14px; font-size: 1.1rem;">SendMessage</button>
                </form>
            </div>
        </div>

        <div class="map-placeholder">
            <i class="fa-solid fa-map-location-dot fa-2x" style="margin-right: 15px;"></i> Interactive Map Integration (Coming Soon)
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contactForm');
            if(form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    Utils.showToast('Message sent successfully! We will get back to you soon.');
                    form.reset();
                });
            }
        });
    </script>
</body>
</html>
