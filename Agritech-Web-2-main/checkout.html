<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Marketplace - Checkout</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <div id="global-loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--background); display:flex; justify-content:center; align-items:center; z-index:9999;">
        <i class="fa-solid fa-spinner fa-spin fa-3x" style="color:var(--primary);"></i>
    </div>

    <div id="navbar-container"></div>

    <main class="page-container" style="padding-top: 100px; padding-bottom: 60px;">
        <div class="checkout-header" style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: var(--primary); font-family: 'Playfair Display', serif; font-size: 2.5rem;">Secure Checkout</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 10px;">Please enter your details to complete the order</p>
        </div>

        <div class="checkout-layout">
            <!-- Left Side: Forms -->
            <div class="checkout-forms">
                <form id="checkoutForm">
                    <!-- Shipping Section -->
                    <div class="checkout-section">
                        <h2><i class="fa-solid fa-truck-fast"></i> Shipping Information</h2>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="chkName" required placeholder="John Doe">
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" id="chkPhone" required placeholder="+1 (555) 000-0000">
                            </div>
                            <div class="form-group full-width">
                                <label>Address</label>
                                <input type="text" id="chkAddress" required placeholder="123 Farm Lane">
                            </div>
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" id="chkCity" required placeholder="Sunnyville">
                            </div>
                            <div class="form-group">
                                <label>Zip Code</label>
                                <input type="text" id="chkZip" required placeholder="90210">
                            </div>
                        </div>
                    </div>

                    <!-- Payment Section -->
                    <div class="checkout-section">
                        <h2><i class="fa-solid fa-credit-card"></i> Payment Method (Mock)</h2>
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label>Name on Card</label>
                                <input type="text" id="chkCardName" required placeholder="John Doe">
                            </div>
                            <div class="form-group full-width">
                                <label>Card Number</label>
                                <input type="text" id="chkCardNum" required placeholder="XXXX XXXX XXXX XXXX" maxlength="19">
                            </div>
                            <div class="form-group">
                                <label>Expiry Date</label>
                                <input type="text" id="chkExp" required placeholder="MM/YY" maxlength="5">
                            </div>
                            <div class="form-group">
                                <label>CVV</label>
                                <input type="text" id="chkCvv" required placeholder="123" maxlength="4">
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="placeOrderBtn" style="width: 100%; padding: 18px; font-size: 1.2rem; border-radius: 8px;">
                        Place Order <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    <p style="text-align: center; margin-top: 15px; color: var(--text-muted); font-size: 0.9rem;">
                        <i class="fa-solid fa-lock"></i> 100% Secure Checkout process
                    </p>
                </form>
            </div>

            <!-- Right Side: Order Summary -->
            <div class="checkout-summary">
                <h2>Order Summary</h2>
                <div id="checkoutItemsList" class="checkout-items-list">
                    <!-- Injected via JS -->
                </div>
                <div class="checkout-totals">
                    <div class="tot-row">
                        <span>Subtotal</span>
                        <span id="chkSubtotal">$0.00</span>
                    </div>
                    <div class="tot-row">
                        <span>Shipping</span>
                        <span id="chkShipping">$0.00</span>
                    </div>
                    <div class="tot-row">
                        <span>Tax (8%)</span>
                        <span id="chkTax">$0.00</span>
                    </div>
                    <div class="tot-row grand-total">
                        <span>Total</span>
                        <span id="chkGrandTotal">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
